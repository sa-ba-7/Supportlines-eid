<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Cards</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

select,input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  font-size:15px;
}

button{
  background:#f45b1f;
  color:#fff;
  border:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h3>Eid Card Generator</h3>

  <select id="lang">
    <option value="ar">العربية</option>
    <option value="en">English</option>
  </select>

  <input id="name" placeholder="اكتب الاسم / Enter name">

  <button onclick="generate()">Download</button>
</div>

<canvas id="c"></canvas>

<script>
const imgs = {
  ar: "eid-ar.png",
  en: "eid-en.png"
};

function generate(){
  const name = document.getElementById("name").value.trim();
  const lang = document.getElementById("lang").value;

  if(!name){
    alert("اكتب الاسم");
    return;
  }

  const img = new Image();

  img.onload = function(){
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    // الخط
    let fontSize = 70;
    do{
      ctx.font = "bold " + fontSize + "px Cairo";
      fontSize -= 2;
    }while(ctx.measureText(name).width > 500 && fontSize > 30);

    ctx.fillStyle = "#0b3550";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const x = canvas.width / 2;

    // 🎯 هنا السر: مركز المستطيل الأبيض
    const y = canvas.height * 0.84;

    ctx.fillText(name, x, y);

    const link = document.createElement("a");
    link.download = "eid_card.png";
    link.href = canvas.toDataURL();
    link.click();
  };

  img.src = imgs[lang] + "?v=" + Date.now();
}
</script>

</body>
</html>
