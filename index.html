<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Lines Eid Cards</title>

<style>
body{
  margin:0;
  font-family: Arial, Tahoma;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:90%;
  max-width:400px;
  background:white;
  padding:22px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}

h2{
  margin-bottom:12px;
  color:#0b3550;
  font-size:20px;
}

select,input,button{
  width:100%;
  padding:13px;
  margin-top:10px;
  border-radius:10px;
  font-size:15px;
}

input,select{
  border:1px solid #ddd;
}

button{
  background:#f45b1f;
  color:white;
  border:none;
  font-weight:bold;
}

canvas{display:none;}
</style>
</head>

<body>

<div class="container">
  <h2>Eid Card Generator</h2>

  <select id="lang">
    <option value="ar">العربية</option>
    <option value="en">English</option>
  </select>

  <input id="name" placeholder="Enter Name / اكتب الاسم">

  <button onclick="generateCard()">Download</button>
</div>

<canvas id="canvas"></canvas>

<script>
const images = {
  ar: "./eid-ar.png",
  en: "./eid-en.png"
};

function generateCard(){
  const name = document.getElementById("name").value.trim();
  const lang = document.getElementById("lang").value;

  if(!name){
    alert("اكتب الاسم");
    return;
  }

  const img = new Image();
  img.crossOrigin = "anonymous";

  img.onload = function(){
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    let fontSize = 60;
    do{
      ctx.font = "bold " + fontSize + "px Arial";
      fontSize -= 2;
    } while(ctx.measureText(name).width > 500 && fontSize > 30);

    ctx.fillStyle = "#0b3550";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText(name, canvas.width/2, 1680);

    const link = document.createElement("a");
    link.download = "eid_card.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };

  img.onerror = function(){
    alert("المشكلة من الكاش، سوّي تحديث قوي للموقع");
  };

  img.src = images[lang] + "?v=" + new Date().getTime(); // 🔥 كسر الكاش
}
</script>

</body>
</html>
